system:
  seed: 42
  device: "cpu"
  image_size: [224, 224]

model:
  backbone: "resnet18"
  pretrained: true
  num_classes: 11
  num_anchors: 3
  dropout: 0.1

loss:
  box_weight: 1.0
  class_weight: 1.0
  distance_weight: 1.0
  huber_delta: 1.0
  distance_risk_weight: 2.0

training:
  epochs: 30
  batch_size: 16
  lr: 0.0005
  weight_decay: 0.0001
  num_workers: 4
  log_every: 20
  val_every: 1
  checkpoint_dir: "ml/checkpoints"
  early_stop_patience: 8

augmentation:
  enabled: true
  rain_prob: 0.4
  fog_prob: 0.3
  night_prob: 0.3
  color_jitter: true
  horizontal_flip: true

dataset:
  root: null
  format: "crowdai"      # crowdai (YOLO txt) | udacity (CSV)
  camera:
    focal_length_px: 720.0
    sensor_height_px: 224
  object_heights_m:
    car: 1.5
    truck: 3.5
    pedestrian: 1.7
    bicyclist: 1.7
    light: 0.5
    sign: 1.0
    bus: 3.2
    van: 2.0
    rider: 1.7
    others: 1.5
    trafficcone: 0.7
  min_box_area_px: 400

onnx:
  opset: 13
  dynamic_batch: false
  quantize: "fp16"
  int8_calib_samples: 64
